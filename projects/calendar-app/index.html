<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Triple Calendar + Age Calculator | Rahim Shah Ziar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Tahoma', sans-serif;
            background: linear-gradient(145deg, #0a0f2a 0%, #0a1128 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Language Switcher */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 15px;
        }

        .lang-btn {
            background: rgba(230, 196, 94, 0.2);
            border: 1px solid rgba(230, 196, 94, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: #e6c45e;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #e6c45e, #b8860b);
            color: #0a0f2a;
            border-color: transparent;
        }

        .lang-btn:hover {
            transform: translateY(-2px);
        }

        /* Header */
        .header {
            text-align: center;
            padding: 25px 0 20px;
            border-bottom: 2px solid rgba(230, 196, 94, 0.4);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #f3e5ab, #e6c45e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 13px;
            color: #8e9aaf;
            margin-top: 5px;
        }

        /* Calendars Grid */
        .calendars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .calendar-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(230, 196, 94, 0.25);
            transition: 0.3s;
        }

        .calendar-card:hover {
            transform: translateY(-5px);
            border-color: #e6c45e;
        }

        .calendar-icon {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .calendar-title {
            font-size: 18px;
            font-weight: 600;
            color: #e6c45e;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .date-display {
            font-size: 32px;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 20px;
        }

        .year-display {
            font-size: 18px;
            color: #b9c7d9;
            margin-top: 10px;
        }

        /* Age Section */
        .age-section {
            background: linear-gradient(135deg, rgba(230,196,94,0.1), rgba(184,134,11,0.05));
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(230, 196, 94, 0.4);
        }

        .age-section h2 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #e6c45e;
        }

        .age-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .age-inputs input {
            padding: 12px 15px;
            border-radius: 40px;
            border: none;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
            width: 130px;
            text-align: center;
            border: 1px solid rgba(230,196,94,0.5);
        }

        .age-inputs input::placeholder {
            color: #8e9aaf;
        }

        .age-inputs button {
            background: linear-gradient(135deg, #e6c45e, #b8860b);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #0a0f2a;
        }

        .age-inputs button:hover {
            transform: scale(1.02);
        }

        .age-result {
            text-align: center;
            font-size: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 25px;
        }

        .age-result span {
            color: #e6c45e;
            font-weight: bold;
            font-size: 28px;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #6c7a8f;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(230,196,94,0.2);
        }

        @media (max-width: 650px) {
            .date-display {
                font-size: 24px;
            }
            .calendar-title {
                font-size: 16px;
            }
            .age-inputs input {
                width: 100px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Language Switcher -->
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('ps')">پښتو</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
    </div>

    <div class="header">
        <h1 id="mainTitle">📅 درې ګونی جنتري</h1>
        <p id="subTitle">هجري قمري · هجري شمسي · میلادي | د عمر محاسبه</p>
    </div>

    <!-- Three Calendars -->
    <div class="calendars-grid">
        <div class="calendar-card">
            <div class="calendar-icon">🌙</div>
            <div class="calendar-title" id="hijriTitle">هجري قمري</div>
            <div class="date-display" id="hijriDate">--</div>
            <div class="year-display" id="hijriYear">-- هـ</div>
        </div>

        <div class="calendar-card">
            <div class="calendar-icon">☀️</div>
            <div class="calendar-title" id="shamsiTitle">هجري شمسي</div>
            <div class="date-display" id="shamsiDate">--</div>
            <div class="year-display" id="shamsiYear">-- ش</div>
        </div>

        <div class="calendar-card">
            <div class="calendar-icon">🌍</div>
            <div class="calendar-title" id="gregorianTitle">میلادي</div>
            <div class="date-display" id="gregorianDate">--</div>
            <div class="year-display" id="gregorianYear">-- م</div>
        </div>
    </div>

    <!-- Age Calculator -->
    <div class="age-section">
        <h2 id="ageTitle">📆 د عمر محاسبه</h2>
        <div class="age-inputs">
            <input type="number" id="day" placeholder="Day" min="1" max="31">
            <input type="number" id="month" placeholder="Month" min="1" max="12">
            <input type="number" id="year" placeholder="Year" min="1300" max="2025">
            <button onclick="calculateAge()" id="calcBtn">Calculate Age</button>
        </div>
        <div class="age-result" id="ageResult">
            Enter your birth date (Gregorian)
        </div>
        <div class="age-result" id="ageHijriResult" style="margin-top: 10px; font-size: 16px;">
            
        </div>
    </div>

    <div class="footer">
        <p id="footerText">© 2025 Rahim Shah Ziar | All calendars update in real time</p>
    </div>
</div>

<script>
    // Language translations
    const translations = {
        ps: {
            mainTitle: "📅 درې ګونی جنتري",
            subTitle: "هجري قمري · هجري شمسي · میلادي | د عمر محاسبه",
            hijriTitle: "هجري قمري",
            shamsiTitle: "هجري شمسي",
            gregorianTitle: "میلادي",
            ageTitle: "📆 د عمر محاسبه",
            dayPlaceholder: "ورځ",
            monthPlaceholder: "میاشت",
            yearPlaceholder: "کال",
            calcBtn: "حساب کړه",
            defaultMsg: "د زوکړې نیټه وټاکئ (میلادي)",
            footer: "© 2025 Rahim Shah Ziar | ټول کاله په ریښتیني وخت تازه کیږي",
            hijriSuffix: "هـ",
            shamsiSuffix: "ش",
            gregorianSuffix: "م",
            ageResult: "🎂 ستاسو عمر: ",
            years: "کاله",
            months: "میاشتې",
            days: "ورځې",
            hijriAge: "🌙 تقریبا ",
            shamsiAge: " ☀️ ",
            hijriAgeSuffix: "قمري کاله",
            shamsiAgeSuffix: "شمسي کاله",
            errorMsg: "⚠️ مهرباني وکړئ سمه میلادي نیټه وټاکئ (ورځ، میاشت، کال)"
        },
        en: {
            mainTitle: "📅 Triple Calendar",
            subTitle: "Hijri · Solar Hijri · Gregorian | Age Calculator",
            hijriTitle: "Hijri (Lunar)",
            shamsiTitle: "Solar Hijri",
            gregorianTitle: "Gregorian",
            ageTitle: "📆 Age Calculator",
            dayPlaceholder: "Day",
            monthPlaceholder: "Month",
            yearPlaceholder: "Year",
            calcBtn: "Calculate",
            defaultMsg: "Enter your birth date (Gregorian)",
            footer: "© 2025 Rahim Shah Ziar | All calendars update in real time",
            hijriSuffix: "AH",
            shamsiSuffix: "SH",
            gregorianSuffix: "AD",
            ageResult: "🎂 Your age: ",
            years: "years",
            months: "months",
            days: "days",
            hijriAge: "🌙 Approximately ",
            shamsiAge: " ☀️ ",
            hijriAgeSuffix: "lunar years",
            shamsiAgeSuffix: "solar years",
            errorMsg: "⚠️ Please enter a valid Gregorian date (Day, Month, Year)"
        }
    };

    let currentLang = 'ps';

    function setLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        
        // Update all text elements
        document.getElementById('mainTitle').innerHTML = t.mainTitle;
        document.getElementById('subTitle').innerHTML = t.subTitle;
        document.getElementById('hijriTitle').innerHTML = t.hijriTitle;
        document.getElementById('shamsiTitle').innerHTML = t.shamsiTitle;
        document.getElementById('gregorianTitle').innerHTML = t.gregorianTitle;
        document.getElementById('ageTitle').innerHTML = t.ageTitle;
        
        // Update input placeholders
        document.getElementById('day').placeholder = t.dayPlaceholder;
        document.getElementById('month').placeholder = t.monthPlaceholder;
        document.getElementById('year').placeholder = t.yearPlaceholder;
        
        // Update button text
        document.getElementById('calcBtn').innerHTML = t.calcBtn;
        
        // Update footer
        document.getElementById('footerText').innerHTML = t.footer;
        
        // Update active class on buttons
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if ((lang === 'ps' && btn.innerText === 'پښتو') || (lang === 'en' && btn.innerText === 'English')) {
                btn.classList.add('active');
            }
        });
        
        // Refresh calendars and age display
        updateCalendars();
        if (document.getElementById('day').value && document.getElementById('month').value && document.getElementById('year').value) {
            calculateAge();
        } else {
            document.getElementById('ageResult').innerHTML = t.defaultMsg;
            document.getElementById('ageHijriResult').innerHTML = '';
        }
    }

    // Update Calendars
    function updateCalendars() {
        const now = new Date();
        const gregYear = now.getFullYear();
        const gregMonth = now.getMonth() + 1;
        const gregDay = now.getDate();
        const t = translations[currentLang];
        
        // Gregorian display
        document.getElementById("gregorianDate").innerText = `${gregDay.toString().padStart(2,'0')}/${gregMonth.toString().padStart(2,'0')}/${gregYear}`;
        document.getElementById("gregorianYear").innerHTML = `${gregYear} ${t.gregorianSuffix}`;

        // Hijri (Lunar) calculation
        const hijriEpoch = 622;
        const lunarYearDays = 354.367;
        const gregDays = (gregYear - hijriEpoch) * 365.2425 + (now.getTime() - new Date(gregYear,0,1).getTime()) / (1000*3600*24);
        let hijriYear = Math.floor(gregDays / lunarYearDays) + 1;
        let hijriDayOfYear = Math.floor(gregDays % lunarYearDays);
        
        const hijriMonths = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29];
        let hijriMonth = 0;
        let hijriDay = hijriDayOfYear;
        for(let i = 0; i < hijriMonths.length; i++){
            if(hijriDay <= hijriMonths[i]){
                hijriMonth = i+1;
                break;
            }
            hijriDay -= hijriMonths[i];
        }
        if(hijriMonth === 0) hijriMonth = 1;
        
        document.getElementById("hijriDate").innerText = `${hijriDay.toString().padStart(2,'0')}/${hijriMonth.toString().padStart(2,'0')}`;
        document.getElementById("hijriYear").innerHTML = `${hijriYear} ${t.hijriSuffix}`;

        // Solar Hijri calculation
        const shamsiMonths = ["حمل", "ثور", "جوزا", "سرطان", "اسد", "سنبله", "میزان", "عقرب", "قوس", "جدی", "دلو", "حوت"];
        const shamsiStart = new Date(gregYear, 2, 20);
        let diffDays = Math.floor((now - shamsiStart) / (1000*3600*24));
        let shamsiYear = gregYear - 621;
        let shamsiMonth = 0;
        let shamsiDay = diffDays;
        
        if(diffDays < 0){
            shamsiYear = gregYear - 622;
            const prevStart = new Date(gregYear-1, 2, 20);
            diffDays = Math.floor((now - prevStart) / (1000*3600*24));
            shamsiDay = diffDays;
        }
        
        const shamsiMonthDays = [31, 31, 31, 31, 31, 31, 30, 30, 30, 30, 30, 29];
        let isLeap = (shamsiYear % 33 === 1 || shamsiYear % 33 === 2 || shamsiYear % 33 === 3 || shamsiYear % 33 === 29);
        shamsiMonthDays[11] = isLeap ? 30 : 29;
        
        for(let i = 0; i < shamsiMonthDays.length; i++){
            if(shamsiDay <= shamsiMonthDays[i]){
                shamsiMonth = i+1;
                break;
            }
            shamsiDay -= shamsiMonthDays[i];
        }
        if(shamsiMonth === 0) shamsiMonth = 1;
        
        const monthName = currentLang === 'ps' ? ` (${shamsiMonths[shamsiMonth-1]})` : '';
        document.getElementById("shamsiDate").innerHTML = `${shamsiDay.toString().padStart(2,'0')}/${shamsiMonth.toString().padStart(2,'0')}${monthName}`;
        document.getElementById("shamsiYear").innerHTML = `${shamsiYear} ${t.shamsiSuffix}`;
    }

    // Calculate Age
    function calculateAge() {
        let day = parseInt(document.getElementById('day').value);
        let month = parseInt(document.getElementById('month').value);
        let year = parseInt(document.getElementById('year').value);
        const t = translations[currentLang];
        
        if(!day || !month || !year || day<1 || day>31 || month<1 || month>12 || year<1300 || year>2025){
            document.getElementById('ageResult').innerHTML = t.errorMsg;
            document.getElementById('ageHijriResult').innerHTML = "";
            return;
        }
        
        const birthDate = new Date(year, month-1, day);
        const today = new Date();
        
        let ageYears = today.getFullYear() - birthDate.getFullYear();
        let ageMonths = today.getMonth() - birthDate.getMonth();
        let ageDays = today.getDate() - birthDate.getDate();
        
        if(ageDays < 0){
            ageMonths--;
            const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
            ageDays += lastMonth.getDate();
        }
        if(ageMonths < 0){
            ageYears--;
            ageMonths += 12;
        }
        
        document.getElementById('ageResult').innerHTML = `${t.ageResult}<span>${ageYears}</span> ${t.years}, <span>${ageMonths}</span> ${t.months}, <span>${ageDays}</span> ${t.days}`;
        
        let totalDays = Math.floor((today - birthDate) / (1000*3600*24));
        let hijriAge = Math.floor(totalDays / 354.367);
        let shamsiAge = ageYears;
        
        document.getElementById('ageHijriResult').innerHTML = `${t.hijriAge}${hijriAge} ${t.hijriAgeSuffix}${t.shamsiAge}${shamsiAge} ${t.shamsiAgeSuffix}`;
    }

    // Initialize
    updateCalendars();
    setInterval(updateCalendars, 1000);
</script>
</body>
</html>
